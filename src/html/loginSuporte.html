<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <title>Login Suporte | JoinUp</title>
</head>

<body>
    <div class="login-page">
        <div class="cta__orbs">
            <div class="orb orb--4"></div>
            <div class="orb orb--5"></div>
        </div>
        <div class="container">
            <div class="cta__inner fade-in">
                <h2 class="cta__title">Acesso ao <br /><span class="text-gradient">Suporte</span></h2>
                <p class="cta__subtitle">Entre com suas credenciais de suporte.</p>

                <form class="cta__form glass" id="loginForm">
                    <input type="email" name="email" placeholder="E-mail de suporte" class="cta__input" required />
                    <input type="password" name="senha" placeholder="Senha de suporte" class="cta__input" required />

                    <button type="submit" class="btn btn--primary btn--glow btn--lg cta__submit">
                        Acessar Painel →
                    </button>
                </form>

                <p class="cta__terms" style="text-align: center; margin-top: 2rem;">
                    <a href="index.html" style="color: var(--primary-purple); text-decoration: none; font-weight: 600;">Voltar para o início</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/loginSuporte.js"></script>
</body>

</html>
