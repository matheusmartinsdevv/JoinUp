<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../Css/cadastro.css" />
  <title>Crie sua conta</title>
</head>

<body>
  <section class="cta" id="cadastro">
    <div class="cta__orbs">
      <div class="orb orb--4"></div>
      <div class="orb orb--5"></div>
    </div>
    <div class="container">
      <div class="cta__inner fade-in">
        <span class="badge">✦ É de graça pra começar</span>
        <h2 class="cta__title">Pronto pra entrar<br /><span class="text-gradient">no rolê?</span></h2>
        <p class="cta__subtitle">Crie sua conta agora e encontre sua galera no próximo evento.</p>


        <form class="cta__form glass" id="ctaForm">

          <input type="text" name="cnpj" placeholder="00.000.000/0000-00" class="cta__input" required />

          <input type="text" name="nome" placeholder="Seu nome" class="cta__input" required />

          <input type="email" name="email" placeholder="Seu melhor e-mail" class="cta__input" required />

          <input type="password" name="senha" placeholder="Crie sua senha" class="cta__input" required />

          <button type="submit" class="btn btn--primary btn--glow btn--lg cta__submit">
            Criar conta grátis →
          </button>
        </form>

        <a href="login.html">
          <button type="submit" class="btn--primary">Fazer login</button>
        </a>


        <p class="cta__terms">Sem spam. Cancelamento a qualquer hora. Ingresso de presente pra quem entrar agora. 🎟</p>
      </div>
    </div>
  </section>
  <script src="../js/cadastroParticipante.js"></script>
</body>

</html>
